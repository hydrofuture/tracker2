<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Cycle Tracker</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --night-color: #38bdf8;
            --night-glow: rgba(56, 189, 248, 0.2);
            --day-color: #fbbf24;
            --day-glow: rgba(251, 191, 36, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 550px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        /* Current Status Section */
        .status-panel {
            margin-bottom: 35px;
            padding-bottom: 25px;
            border-bottom: 1px solid var(--glass-border);
        }

        .label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .current-phase {
            font-size: 2.5rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 10px;
            transition: all 0.5s ease;
        }

        .phase-night {
            color: var(--night-color);
            text-shadow: 0 0 20px var(--night-glow);
        }

        .phase-day {
            color: var(--day-color);
            text-shadow: 0 0 20px var(--day-glow);
        }

        .timer {
            font-size: 3.5rem;
            font-weight: 700;
            font-family: monospace;
            letter-spacing: -0.02em;
        }

        /* Schedule Table Section */
        .schedule-title {
            font-size: 1.1rem;
            font-weight: 600;
            text-align: left;
            margin-bottom: 15px;
            color: var(--text-primary);
        }

        .table-container {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 0.95rem;
        }

        th, td {
            padding: 12px 16px;
        }

        th {
            background: rgba(0, 0, 0, 0.2);
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        tr {
            border-bottom: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.01);
        }

        tr:last-child {
            border-bottom: none;
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .row-night {
            color: var(--night-color);
            font-weight: 600;
        }

        .row-day {
            color: var(--day-color);
            font-weight: 600;
        }

        .time-cell {
            text-align: right;
            color: var(--text-primary);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="status-panel">
            <div class="label">Current Phase</div>
            <div id="current-phase" class="current-phase">Loading...</div>
            <div id="timer" class="timer">00:00:00</div>
        </div>

        <div class="schedule-title">Upcoming Phases</div>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Phase</th>
                        <th style="text-align: right;">Local Start Time</th>
                    </tr>
                </thead>
                <tbody id="schedule-body">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // Constants in milliseconds
        const NIGHT_DURATION = 30 * 60 * 1000; // 30 minutes
        const DAY_DURATION = 2 * 60 * 60 * 1000; // 2 hours
        const CYCLE_DURATION = NIGHT_DURATION + DAY_DURATION; // 2.5 hours

        // Fixed Anchor: Next night begins June 16, 2026 at 11:00 AM PDT.
        // 11:00 AM PDT is 18:00:00 UTC. (Month index 5 = June)
        const ANCHOR_TIME = Date.UTC(2026, 5, 16, 18, 0, 0);

        function updateTracker() {
            const now = Date.now();
            
            // Safe modulo handling for past or future calculations
            let elapsed = now - ANCHOR_TIME;
            let msIntoCurrentCycle = ((elapsed % CYCLE_DURATION) + CYCLE_DURATION) % CYCLE_DURATION;

            let currentPhase = '';
            let timeLeft = 0;
            let currentCycleStart = now - msIntoCurrentCycle;

            // Determine current state
            if (msIntoCurrentCycle < NIGHT_DURATION) {
                currentPhase = 'Night';
                timeLeft = NIGHT_DURATION - msIntoCurrentCycle;
            } else {
                currentPhase = 'Day';
                timeLeft = CYCLE_DURATION - msIntoCurrentCycle;
            }

            // Update DOM for Current Status
            const phaseEl = document.getElementById('current-phase');
            phaseEl.textContent = currentPhase;
            phaseEl.className = `current-phase phase-${currentPhase.toLowerCase()}`;
            document.getElementById('timer').textContent = formatCountdown(timeLeft);

            // Generate Next 10 Phases
            const scheduleBody = document.getElementById('schedule-body');
            scheduleBody.innerHTML = '';

            let upcomingPhases = [];
            
            // Scan across a small window of cycles ahead to capture chronologically
            for (let i = 0; i < 7; i++) {
                let cycleStart = currentCycleStart + (i * CYCLE_DURATION);
                let nightStart = cycleStart;
                let dayStart = cycleStart + NIGHT_DURATION;

                if (nightStart > now) upcomingPhases.push({ type: 'Night', time: nightStart });
                if (dayStart > now) upcomingPhases.push({ type: 'Day', time: dayStart });
            }

            // Sort and restrict to the next 10 items
            upcomingPhases.sort((a, b) => a.time - b.time);
            const next10 = upcomingPhases.slice(0, 10);

            // Populate Table
            next10.forEach(phase => {
                const row = document.createElement('tr');
                
                const phaseCell = document.createElement('td');
                phaseCell.textContent = phase.type;
                phaseCell.className = `row-${phase.type.toLowerCase()}`;
                
                const timeCell = document.createElement('td');
                timeCell.className = 'time-cell';
                timeCell.textContent = formatLocalTime(phase.time);

                row.appendChild(phaseCell);
                row.appendChild(timeCell);
                scheduleBody.appendChild(row);
            });
        }

        function formatCountdown(ms) {
            let seconds = Math.floor((ms / 1000) % 60);
            let minutes = Math.floor((ms / (1000 * 60)) % 60);
            let hours = Math.floor((ms / (1000 * 60 * 60)) % 24);

            // Zero padding
            hours = String(hours).padStart(2, '0');
            minutes = String(minutes).padStart(2, '0');
            seconds = String(seconds).padStart(2, '0');

            return `${hours}:${minutes}:${seconds}`;
        }

        function formatLocalTime(timestamp) {
            return new Date(timestamp).toLocaleTimeString([], {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
        }

        // Run immediately, then tick every second
        updateTracker();
        setInterval(updateTracker, 1000);
    </script>
</body>
</html>
