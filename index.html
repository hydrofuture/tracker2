<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Day/Night Tracker - 112px Visualizer</title>
<style>
  /* Base Reset & Background */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
    background: #0f172a; 
    color: #f8fafc;
    display: flex; 
    justify-content: center; 
    padding: 24px 16px; 
  }

  .widget { width: 100%; max-width: 480px; }
  
  .current-time { 
    text-align: center; 
    font-size: 14px; 
    font-weight: 700; 
    color: #94a3b8; 
    margin-bottom: 12px; 
    letter-spacing: 0.5px;
  }

  /* Specifically 112px Glassmorphism Sky Box */
  .sky { 
    border-radius: 14px; 
    overflow: hidden; 
    height: 112px; /* Set to exactly 112 pixels */
    position: relative; 
    margin-bottom: 16px; 
    transition: background 1.2s ease;
    border: 1px solid rgba(255, 255, 255, 0.1);
  }
  
  .widget.is-day .sky { background: linear-gradient(to bottom, #1e40af 0%, #3b82f6 100%); }
  .widget.is-night .sky { background: linear-gradient(to bottom, #020617 0%, #1e1b4b 100%); }

  #stars { position: absolute; inset: 0; transition: opacity 1.2s; }
  .widget.is-day #stars { opacity: 0; }
  .widget.is-night #stars { opacity: 0.6; }

  #celestial { 
    position: absolute; 
    width: 34px; /* Adjusted for 112px height */
    height: 34px; 
    border-radius: 50%; 
    top: 50%; 
    transform: translateY(-50%); 
    transition: left 1s linear; 
  }
  .widget.is-day #celestial { background: #fbbf24; box-shadow: 0 0 22px #fbbf24; }
  .widget.is-night #celestial { background: #f1f5f9; box-shadow: 0 0 15px rgba(255, 255, 255, 0.4); }

  .horizon { 
    position: absolute; 
    bottom: 0; 
    left: 0; 
    right: 0; 
    height: 22px; 
    background: rgba(16, 185, 129, 0.2); 
    backdrop-filter: blur(4px);
  }

  .phase-badge { 
    position: absolute; 
    top: 10px; 
    right: 12px; 
    padding: 5px 14px; 
    border-radius: 18px; 
    font-size: 11px; 
    font-weight: 700;
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255, 255, 255, 0.2);
  }
  .badge-day { background: rgba(251, 191, 36, 0.2); color: #fef3c7; }
  .badge-night { background: rgba(99, 102, 241, 0.2); color: #e0e7ff; }

  .stats { display: flex; gap: 12px; margin-bottom: 18px; }
  .stat-card { 
    flex: 1; 
    background: rgba(255, 255, 255, 0.05); 
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.1); 
    border-radius: 12px; 
    padding: 12px; 
  }
  .stat-label { font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .stat-val { font-size: 17px; font-weight: 700; color: #fff; }

  /* Progress Bar */
  .progress-header { display: flex; justify-content: space-between; font-size: 12px; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
  .progress-track { background: rgba(255, 255, 255, 0.1); border-radius: 10px; height: 10px; overflow: hidden; margin-bottom: 24px; }
  .progress-fill { height: 100%; transition: width 1s linear; }
  .fill-day { background: #fbbf24; }
  .fill-night { background: #6366f1; }

  /* Upcoming Table */
  .upcoming { border-top: 1px solid rgba(255, 255, 255, 0.1); padding-top: 20px; }
  .upcoming h3 { font-size: 13px; font-weight: 700; color: #cbd5e1; margin-bottom: 14px; text-transform: uppercase; text-align: center; }
  
  .cycle-table { 
    width: 100%; 
    border-collapse: separate; 
    border-spacing: 0 6px; 
    font-size: 12px; 
    table-layout: fixed;
  }
  .cycle-table th { text-align: center; padding-bottom: 8px; color: #64748b; font-weight: 600; }
  .cycle-table td { 
    padding: 11px 8px; 
    background: rgba(255, 255, 255, 0.03);
    text-align: center;
    border-top: 1px solid rgba(255, 255, 255, 0.05);
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
  }
  .cycle-table td:first-child { border-radius: 8px 0 0 8px; border-left: 1px solid rgba(255, 255, 255, 0.05); }
  .cycle-table td:last-child { border-radius: 0 8px 8px 0; border-right: 1px solid rgba(255, 255, 255, 0.05); }

  .pill { padding: 4px 10px; border-radius: 6px; font-weight: 800; font-size: 10px; letter-spacing: 0.5px; }
  .pill-day { background: rgba(251, 191, 36, 0.15); color: #fbbf24; }
  .pill-night { background: rgba(99, 102, 241, 0.15); color: #818cf8; }

  .anchor-info { font-size: 10px; color: #475569; text-align: center; margin-top: 28px; }
</style>
</head>
<body>

<main id="widget" class="widget">
  <div id="current-time-display" class="current-time">--:--:--</div>

  <div id="sky" class="sky">
    <div id="stars">
      <svg width="100%" height="100%" viewBox="0 0 480 112">
        <circle cx="40" cy="18" r="1.1" fill="white" opacity="0.9"/><circle cx="170" cy="28" r="1.6" fill="white" opacity="0.8"/>
        <circle cx="300" cy="22" r="1" fill="white" opacity="0.9"/><circle cx="420" cy="20" r="1.3" fill="white" opacity="0.8"/>
        <circle cx="100" cy="45" r="0.9" fill="white" opacity="0.5"/><circle cx="380" cy="70" r="1.1" fill="white" opacity="0.6"/>
      </svg>
    </div>
    <div id="celestial"></div>
    <div class="horizon"></div>
    <div id="phase-badge" class="phase-badge"></div>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-label">Phase</div>
      <div id="stat-phase" class="stat-val">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Remaining</div>
      <div id="stat-remaining" class="stat-val">—</div>
    </div>
  </div>

  <div class="progress-header"><span>PROGRESS</span><span id="pct-label">0%</span></div>
  <div class="progress-track"><div id="progress-fill" class="progress-fill"></div></div>

  <section class="upcoming">
    <h3>Upcoming Schedule</h3>
    <table class="cycle-table">
      <thead>
        <tr>
          <th>Phase</th>
          <th>Start</th>
          <th>End</th>
        </tr>
      </thead>
      <tbody id="cycles-body"></tbody>
    </table>
  </section>

  <div class="anchor-info">Anchored: June 16, 2026, 11:00 AM PST (19:00 UTC)</div>
</main>

<script>
  const nightMs = 30 * 60 * 1000;
  const dayMs   = 2 * 60 * 60 * 1000;
  
  // NEW ANCHOR: Exactly June 16, 2026 at 11:00 AM PST mapped to universal UTC
  const ANCHOR_DATE = new Date("2026-06-16T19:00:00Z"); 

  function getSegments(count = 12) {
    const now = new Date();
    let segments = [];
    let cursor = new Date(ANCHOR_DATE);
    
    // ADJUSTMENT: Since our anchor is 11:00 AM PST (the start of Night), 
    // we change the initial loop phase to NIGHT (isDay = false)
    let isDay = false; 
    let nightCount = 0;

    while (cursor < now || segments.length < count) {
      let duration = isDay ? dayMs : nightMs;
      let start = new Date(cursor.getTime());
      let end = new Date(cursor.getTime() + duration);

      if (!isDay) nightCount++;
      let isSpecialReset = (!isDay && nightCount > 0 && nightCount % 3 === 0);

      if (end > now) {
        segments.push({ phase: isDay ? 'DAY' : 'NIGHT', start, end, isSpecialReset });
      }

      cursor = new Date(end.getTime());

      if (isSpecialReset) {
        isDay = true;
        nightCount = 0;
      } else {
        isDay = !isDay;
      }
      
      if (segments.length > count + 30) break;
    }
    return segments;
  }

  function update() {
    const now = new Date();
    document.getElementById('current-time-display').textContent = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});

    const segments = getSegments(12);
    if (!segments.length) return;
    
    const seg = segments[0];
    const isDay = seg.phase === 'DAY';
    
    const elapsed = now - seg.start;
    const total = seg.end - seg.start;
    const remaining = Math.max(0, seg.end - now);
    const pct = Math.min(100, Math.max(0, Math.round((elapsed / total) * 100)));

    document.getElementById('widget').className = 'widget ' + (isDay ? 'is-day' : 'is-night');
    document.getElementById('celestial').style.left = (10 + (pct / 100) * 80) + '%';
    document.getElementById('phase-badge').textContent = isDay ? '☀ DAY' : '☾ NIGHT';
    document.getElementById('phase-badge').className = 'phase-badge ' + (isDay ? 'badge-day' : 'badge-night');
    document.getElementById('stat-phase').textContent = isDay ? 'Day' : 'Night';
    document.getElementById('stat-remaining').textContent = fmt(remaining);
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('progress-fill').className = 'progress-fill ' + (isDay ? 'fill-day' : 'fill-night');
    document.getElementById('pct-label').textContent = pct + '%';

    const tbody = document.getElementById('cycles-body');
    tbody.innerHTML = '';
    segments.slice(0, 9).forEach(s => {
      const tr = document.createElement('tr');
      if (s.isSpecialReset) tr.style.background = "rgba(99, 102, 241, 0.08)";
      tr.innerHTML = `
        <td><span class="pill ${s.phase === 'DAY' ? 'pill-day' : 'pill-night'}">${s.phase}</span></td>
        <td>${s.start.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</td>
        <td>${s.end.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</td>
      `;
      tbody.appendChild(tr);
    });
  }

  function fmt(ms) {
    let s = Math.floor(ms / 1000);
    let h = Math.floor(s / 3600);
    let m = Math.floor((s % 3600) / 60);
    let sec = s % 60;
    return h > 0 ? `${h}h ${m}m` : `${m}m ${sec}s`;
  }

  setInterval(update, 1000);
  update();
</script>
</body>
</html>
